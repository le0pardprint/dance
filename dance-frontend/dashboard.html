<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Школа танцев</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-title">Школа танцев "Ритм"</div>
      <div class="s-sub">CRM система</div>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sb-avatar">?</div>
      <div>
        <div class="u-name" id="sb-email">—</div>
        <div class="u-role" id="sb-role">—</div>
      </div>
    </div>
    <nav class="nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logout-btn">Выйти</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <h2 id="page-title">Главная</h2>
      <span class="topbar-url" id="api-label"></span>
    </header>
    <div class="content">

      <!-- CLIENT -->
      <div class="page" id="page-client">
        <div id="client-name-banner" class="client-banner"></div>
        <div id="client-stats"></div>
        <div class="card">
          <div class="card-body">
            <div class="tabs">
              <button class="tab-btn active" data-tab="client-schedule">Расписание</button>
              <button class="tab-btn" data-tab="client-groups">Мои группы</button>
              <button class="tab-btn" data-tab="client-payments">Оплаты</button>
            </div>
            <div class="tab-pane active" id="client-schedule"></div>
            <div class="tab-pane" id="client-groups"></div>
            <div class="tab-pane" id="client-payments"></div>
          </div>
        </div>
      </div>

      <!-- TRAINER -->
      <div class="page" id="page-trainer">
        <div id="trainer-stats"></div>
        <div class="card">
          <div class="card-body">
            <div class="tabs">
              <button class="tab-btn active" data-tab="trainer-schedule">Расписание</button>
              <button class="tab-btn" data-tab="trainer-groups">Мои группы</button>
            </div>
            <div class="tab-pane active" id="trainer-schedule"></div>
            <div class="tab-pane" id="trainer-groups"></div>
          </div>
        </div>
      </div>

      <!-- DIRECTOR -->
      <div class="page" id="page-director">
        <div id="director-stats"></div>
        <div class="card">
          <div class="card-body">
            <div class="tabs">
              <button class="tab-btn active" data-tab="dir-occupancy">Заполненность</button>
              <button class="tab-btn" data-tab="dir-popularity">Направления</button>
              <button class="tab-btn" data-tab="dir-workload">Тренеры</button>
            </div>
            <div class="tab-pane active" id="dir-occupancy"></div>
            <div class="tab-pane" id="dir-popularity"></div>
            <div class="tab-pane" id="dir-workload"></div>
          </div>
        </div>
      </div>

      <!-- ACCOUNTANT -->
      <div class="page" id="page-accountant">
        <div id="acc-stats"></div>
        <div class="card">
          <div class="card-head">
            <h3>Финансы</h3>
            <button class="btn btn-primary btn-sm" id="add-debt-btn">+ Долг</button>
          </div>
          <div class="card-body">
            <div class="tabs">
              <button class="tab-btn active" data-tab="acc-summary">Сводка</button>
              <button class="tab-btn" data-tab="acc-revenue">Выручка</button>
              <button class="tab-btn" data-tab="acc-debts">Долги</button>
            </div>
            <div class="tab-pane active" id="acc-summary"></div>
            <div class="tab-pane" id="acc-revenue"></div>
            <div class="tab-pane" id="acc-debts"></div>
          </div>
        </div>
      </div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <div id="admin-stats"></div>
  <div class="card">
    <div class="card-head">
      <h3>База данных</h3>
      <div id="admin-action-btns">
        <button class="btn btn-primary btn-sm" id="add-client-btn">+ Клиент</button>
        <button class="btn btn-ghost btn-sm" id="add-user-btn">+ Пользователь</button>
        <button class="btn btn-ghost btn-sm" id="add-trainer-btn" style="display:none">+ Тренер</button>
        <button class="btn btn-ghost btn-sm" id="add-group-btn" style="display:none">+ Группа</button>
        <button class="btn btn-ghost btn-sm" id="add-class-btn" style="display:none">+ Занятие</button>
      </div>
    </div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab-btn active" data-tab="admin-clients">Клиенты</button>
        <button class="tab-btn" data-tab="admin-trainers">Тренеры</button>
        <button class="tab-btn" data-tab="admin-groups">Группы</button>
        <button class="tab-btn" data-tab="admin-schedule">Расписание</button>
      </div>
      <div class="tab-pane active" id="admin-clients"></div>
      <div class="tab-pane" id="admin-trainers"></div>
      <div class="tab-pane" id="admin-groups"></div>
      <div class="tab-pane" id="admin-schedule"></div>
    </div>
  </div>
</div>

    </div>
  </div>
</div>

<!-- MODAL: добавить клиента -->
<div class="modal-overlay" id="add-client-modal">
  <div class="modal">
    <div class="modal-head"><h3>Новый клиент</h3></div>
    <div class="modal-body">
      <div id="modal-error" class="error-box" style="display:none"></div>
      <div class="form-row">
        <div class="field"><label>Фамилия *</label><input id="f-lastName" /></div>
        <div class="field"><label>Имя *</label><input id="f-firstName" /></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Возраст</label><input id="f-age" type="number" /></div>
        <div class="field"><label>Телефон</label><input id="f-phone" placeholder="+7..." /></div>
      </div>
      <div class="field"><label>Email</label><input id="f-email" type="email" /></div>
      <div class="field"><label>Группа (необязательно)</label><select id="f-group"><option value="">— Без группы —</option></select></div>
      <div class="field"><label>Сумма абонемента</label><input id="f-amount" type="number" placeholder="3000" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="modal-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: редактировать клиента -->
<div class="modal-overlay" id="edit-client-modal">
  <div class="modal">
    <div class="modal-head"><h3>Редактировать клиента</h3></div>
    <div class="modal-body">
      <div id="edit-modal-error" class="error-box" style="display:none"></div>
      <input type="hidden" id="ef-id" />
      <div class="form-row">
        <div class="field"><label>Фамилия *</label><input id="ef-lastName" /></div>
        <div class="field"><label>Имя *</label><input id="ef-firstName" /></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Возраст</label><input id="ef-age" type="number" /></div>
        <div class="field"><label>Телефон</label><input id="ef-phone" /></div>
      </div>
      <div class="field"><label>Email</label><input id="ef-email" type="email" /></div>
      <div class="field"><label>Добавить в группу (необязательно)</label><select id="ef-group"><option value="">— Без группы —</option></select></div>
      <div class="field"><label>Сумма абонемента</label><input id="ef-amount" type="number" placeholder="3000" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="edit-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="edit-modal-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: добавить пользователя -->
<div class="modal-overlay" id="add-user-modal">
  <div class="modal">
    <div class="modal-head"><h3>Новый пользователь</h3></div>
    <div class="modal-body">
      <div id="user-modal-error" class="error-box" style="display:none"></div>
      <div class="field"><label>Email *</label><input id="u-email" type="email" /></div>
      <div class="field"><label>Пароль *</label><input id="u-password" type="password" /></div>
      <div class="field">
        <label>Роль *</label>
        <select id="u-role">
          <option value="Client">Клиент</option>
          <option value="Trainer">Тренер</option>
          <option value="Admin">Администратор</option>
          <option value="Director">Директор</option>
          <option value="Accountant">Бухгалтер</option>
        </select>
      </div>
      <div class="field"><label>Client ID (если клиент)</label><input id="u-clientId" type="number" /></div>
      <div class="field"><label>Trainer ID (если тренер)</label><input id="u-trainerId" type="number" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="user-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="user-modal-save">Создать</button>
    </div>
  </div>
</div>

<!-- MODAL: изменить статус занятия (тренер) -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <div class="modal-head"><h3>Изменить статус занятия</h3></div>
    <div class="modal-body">
      <input type="hidden" id="sm-class-id" />
      <div class="field">
        <label>Статус</label>
        <select id="sm-status">
          <option value="Запланировано">Запланировано</option>
          <option value="Проведено">Проведено</option>
          <option value="Отменено">Отменено</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="sm-cancel">Отмена</button>
      <button class="btn btn-primary" id="sm-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: изменить долг (бухгалтер) -->
<div class="modal-overlay" id="debt-modal">
  <div class="modal">
    <div class="modal-head"><h3>Изменить статус абонемента</h3></div>
    <div class="modal-body">
      <div id="debt-modal-error" class="error-box" style="display:none"></div>
      <input type="hidden" id="dm-sub-id" />
      <div class="field">
        <label>Статус</label>
        <select id="dm-status">
          <option value="Активен">Активен</option>
          <option value="Оплачен">Оплачен</option>
          <option value="Истёк">Истёк</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="dm-cancel">Отмена</button>
      <button class="btn btn-primary" id="dm-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: добавить долг -->
<div class="modal-overlay" id="add-debt-modal">
  <div class="modal">
    <div class="modal-head"><h3>Добавить долг</h3></div>
    <div class="modal-body">
      <div id="add-debt-modal-error" class="error-box" style="display:none"></div>
      <div class="field"><label>Клиент ID *</label><input id="ad-clientId" type="number" /></div>
      <div class="field"><label>Группа *</label><select id="ad-group"></select></div>
      <div class="field"><label>Сумма *</label><input id="ad-amount" type="number" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="add-debt-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="add-debt-modal-save">Добавить</button>
    </div>
  </div>
</div>

<!-- MODAL: добавить группу -->
<div class="modal-overlay" id="add-group-modal">
  <div class="modal">
    <div class="modal-head"><h3>Новая группа</h3></div>
    <div class="modal-body">
      <div id="add-group-modal-error" class="error-box" style="display:none"></div>
      <div class="field"><label>Название *</label><input id="ag-name" /></div>
      <div class="field"><label>Направление *</label><select id="ag-direction"></select></div>
      <div class="field"><label>Тренер *</label><select id="ag-trainer"></select></div>
      <div class="field">
        <label>Статус</label>
        <select id="ag-status">
          <option value="Активна">Активна</option>
          <option value="Приостановлена">Приостановлена</option>
          <option value="Закрыта">Закрыта</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="add-group-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="add-group-modal-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: изменить статус группы -->
<div class="modal-overlay" id="group-status-modal">
  <div class="modal">
    <div class="modal-head"><h3>Изменить статус группы</h3></div>
    <div class="modal-body">
      <input type="hidden" id="gs-group-id" />
      <div class="field">
        <label>Статус</label>
        <select id="gs-status">
          <option value="Активна">Активна</option>
          <option value="Приостановлена">Приостановлена</option>
          <option value="Закрыта">Закрыта</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="gs-cancel">Отмена</button>
      <button class="btn btn-primary" id="gs-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: добавить тренера -->
<div class="modal-overlay" id="add-trainer-modal">
  <div class="modal">
    <div class="modal-head"><h3>Новый тренер</h3></div>
    <div class="modal-body">
      <div id="add-trainer-modal-error" class="error-box" style="display:none"></div>
      <div class="form-row">
        <div class="field"><label>Фамилия *</label><input id="tr-lastName" /></div>
        <div class="field"><label>Имя *</label><input id="tr-firstName" /></div>
      </div>
      <div class="field"><label>Направление *</label><select id="tr-direction"></select></div>
      <div class="form-row">
        <div class="field"><label>Телефон</label><input id="tr-phone" /></div>
        <div class="field"><label>Email</label><input id="tr-email" type="email" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="add-trainer-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="add-trainer-modal-save">Сохранить</button>
    </div>
  </div>
</div>


<!-- MODAL: добавить занятие -->
<div class="modal-overlay" id="add-class-modal">
  <div class="modal">
    <div class="modal-head"><h3>Новое занятие</h3></div>
    <div class="modal-body">
      <div id="add-class-modal-error" class="error-box" style="display:none"></div>
      <div class="field"><label>Группа *</label><select id="ac-group"></select></div>
      <div class="field"><label>Тренер *</label><select id="ac-trainer"></select></div>
      <div class="form-row">
        <div class="field"><label>Дата *</label><input id="ac-date" type="date" /></div>
        <div class="field"><label>Время *</label><input id="ac-time" type="time" /></div>
      </div>
      <div class="field">
        <label>Статус</label>
        <select id="ac-status">
          <option value="Запланировано">Запланировано</option>
          <option value="Проведено">Проведено</option>
          <option value="Отменено">Отменено</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="add-class-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="add-class-modal-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: записать клиента в группу -->
<div class="modal-overlay" id="reg-client-modal">
  <div class="modal">
    <div class="modal-head"><h3>Записать в группу</h3></div>
    <div class="modal-body">
      <div id="reg-client-modal-error" class="error-box" style="display:none"></div>
      <p style="margin-bottom:14px;font-size:14px">Клиент: <strong id="reg-client-name"></strong></p>
      <input type="hidden" id="reg-client-id" />
      <div class="field"><label>Группа *</label><select id="reg-group"></select></div>
      <div class="field"><label>Занятие (необязательно)</label><select id="reg-class"><option value="">— Без конкретного занятия —</option></select></div>
      <div class="field"><label>Сумма абонемента</label><input id="reg-amount" type="number" placeholder="3000" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="reg-client-modal-cancel">Отмена</button>
      <button class="btn btn-primary" id="reg-client-modal-save">Записать</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
